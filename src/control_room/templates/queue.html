{% extends "base.html" %}
{% block title %}Queue — Control Room{% endblock %}
{% block content %}
<div class="space-y-8">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-cr-green">Blocker Queue</h1>
        <span class="text-sm text-cr-muted">{{ queue.items | length }} items</span>
    </div>

    <!-- Queue list with HTMX auto-refresh -->
    <div id="queue-list" hx-get="/partials/queue-list" hx-trigger="every 15s" hx-swap="innerHTML">
        {% include "partials/queue-list.html" %}
    </div>
</div>
{% endblock %}
