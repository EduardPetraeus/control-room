<div class="space-y-3">
    {% for event in events %}
    <div class="flex items-start gap-3 py-2 border-b border-cr-border last:border-0">
        <!-- Color dot -->
        <div class="mt-1.5 flex-shrink-0">
            <span class="block w-2 h-2 rounded-full
                {% if event.color == 'green' %}bg-cr-green
                {% elif event.color == 'amber' %}bg-cr-amber
                {% elif event.color == 'red' %}bg-cr-red
                {% elif event.color == 'blue' %}bg-blue-400
                {% else %}bg-gray-600{% endif %}">
            </span>
        </div>

        <!-- Content -->
        <div class="flex-1 min-w-0">
            <p class="text-sm text-cr-text truncate">{{ event.title }}</p>
            <div class="flex items-center gap-2 mt-0.5">
                <span class="text-[10px] text-cr-muted">{{ event.repo_name }}</span>
                <span class="text-[10px] text-cr-muted opacity-50">{{ event.event_type }}</span>
                {% if event.date %}
                <span class="text-[10px] text-cr-muted opacity-50">{{ event.date[:10] }}</span>
                {% endif %}
            </div>
        </div>
    </div>
    {% else %}
    <p class="text-sm text-cr-muted">No recent activity</p>
    {% endfor %}
</div>
